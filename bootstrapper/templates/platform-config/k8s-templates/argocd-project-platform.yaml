apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: ${TEAM}
  namespace: argocd
spec:
  description: "Platform team landing zone for ${TEAM}"
  sourceRepos:
    - '*'
  destinations:
    - namespace: ${TEAM}-dev
      server: https://kubernetes.default.svc
    - namespace: ${TEAM}-prd
      server: https://kubernetes.default.svc
    - namespace: '*'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
