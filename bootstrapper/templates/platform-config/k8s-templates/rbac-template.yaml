apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: team-deployer
  namespace: ${NAMESPACE}
rules:
  - apiGroups: ["", "apps", "networking.k8s.io"]
    resources: ["deployments", "services", "ingresses", "pods", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# Bind Authentik OIDC group to the deployer role
# Users in the Authentik group ${AUTHENTIK_GROUP} can manage workloads in ${NAMESPACE}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: team-deployer-binding
  namespace: ${NAMESPACE}
subjects:
  - kind: Group
    name: ${AUTHENTIK_GROUP}
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: team-deployer
  apiGroup: rbac.authorization.k8s.io
---
# Service account for CI pipelines (Forgejo Actions)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${TEAM}-deployer
  namespace: ${NAMESPACE}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ci-deployer-binding
  namespace: ${NAMESPACE}
subjects:
  - kind: ServiceAccount
    name: ${TEAM}-deployer
    namespace: ${NAMESPACE}
roleRef:
  kind: Role
  name: team-deployer
  apiGroup: rbac.authorization.k8s.io
